<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finanzas</title>
    <meta name="theme-color" content="#6FAE8A" />
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Finanzas" />
    <link rel="apple-touch-icon" href="/Control-finanzas-app/icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <script>
      (function() {
        var q = window.location.search;
        if (q && q.indexOf('?p=') === 0) {
          var path = decodeURIComponent(q.slice(3).replace(/&h=.*/, ''));
          var hash = q.match(/&h=(.*)/) ? '#' + decodeURIComponent(q.match(/&h=(.*)/)[1]) : '';
          window.history.replaceState(null, null, '/Control-finanzas-app/' + path + hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
